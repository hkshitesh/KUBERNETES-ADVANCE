apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition

metadata:
  name: webapplications.apps.company.com

spec:
  group: apps.company.com

  names:
    plural: webapplications
    singular: webapplication
    kind: WebApplication
    shortNames:
      - webapp

  scope: Namespaced

  versions:
    - name: v1
      served: true
      storage: true

      schema:
        openAPIV3Schema:
          type: object

          properties:
            spec:
              type: object

              properties:
                image:
                  type: string

                replicas:
                  type: integer

                port:
                  type: integer

                hostname:
                  type: string

              required:
                - image
                - replicas
